services:
  mariadb:
    image: mariadb:11.4
    container_name: approval-workflow-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:?Set MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER:?Set MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD}
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:

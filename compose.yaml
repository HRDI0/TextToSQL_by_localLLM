services:
  mariadb:
    image: mariadb:11.4
    container_name: sql-workflow-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-workflow_root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-approval_workflow}
      MARIADB_USER: ${MARIADB_USER:-workflow_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-workflow_password}
    ports:
      - "127.0.0.1:${MARIADB_HOST_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - sql_workflow_mariadb_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql-workflow-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SQL_WORKFLOW_DB_HOST: mariadb
      SQL_WORKFLOW_DB_PORT: "3306"
      MARIADB_ROOT_PASSWORD: ""
    ports:
      - "127.0.0.1:${SQL_WORKFLOW_STREAMLIT_PORT:-8501}:8501"

volumes:
  sql_workflow_mariadb_data:
